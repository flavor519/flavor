spring.main.web-application-type=reactive
spring.application.name=gateway
server.port=8082

# ?????????????????????
spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=http://localhost:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/user/**


# ====================== Sentinel ?? ????? ======================
spring.cloud.sentinel.enabled=true
spring.cloud.sentinel.gateway.enabled=true

# ????127.0.0.1??????IP??
spring.cloud.sentinel.transport.dashboard=127.0.0.1:8080
spring.cloud.sentinel.transport.port=8083
spring.cloud.sentinel.transport.client-ip=127.0.0.1

spring.cloud.sentinel.filter.enabled=true
spring.cloud.sentinel.filter.url-patterns=/**
spring.cloud.sentinel.filter.order=-100

spring.cloud.sentinel.metric.charset=utf-8
spring.cloud.sentinel.log.dir=./logs
spring.cloud.sentinel.log.switch-pid=true

# ====================== Sentinel Nacos rule datasource ======================
# Gateway flow rules. Create this Data ID in Nacos and put GatewayFlowRule JSON in it.
spring.cloud.sentinel.datasource.gateway-flow.nacos.server-addr=127.0.0.1:8848
spring.cloud.sentinel.datasource.gateway-flow.nacos.data-id=gateway-flow-rules.json
spring.cloud.sentinel.datasource.gateway-flow.nacos.group-id=DEFAULT_GROUP
spring.cloud.sentinel.datasource.gateway-flow.nacos.data-type=json
spring.cloud.sentinel.datasource.gateway-flow.nacos.rule-type=gw-flow

# Controller/@SentinelResource flow rules. Create this Data ID in Nacos and put FlowRule JSON in it.
spring.cloud.sentinel.datasource.controller-flow.nacos.server-addr=127.0.0.1:8848
spring.cloud.sentinel.datasource.controller-flow.nacos.data-id=gateway-controller-flow-rules.json
spring.cloud.sentinel.datasource.controller-flow.nacos.group-id=DEFAULT_GROUP
spring.cloud.sentinel.datasource.controller-flow.nacos.data-type=json
spring.cloud.sentinel.datasource.controller-flow.nacos.rule-type=flow

# ====================== Nacos ?? ======================
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.username=
spring.cloud.nacos.discovery.password=
spring.cloud.nacos.discovery.namespace=public

spring.cloud.nacos.config.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.username=
spring.cloud.nacos.config.password=
spring.cloud.nacos.config.namespace=public

spring.cloud.nacos.config.import-check.enabled=false

# ???
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/studentproject?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.entity
mybatis.configuration.map-underscore-to-camel-case=true
